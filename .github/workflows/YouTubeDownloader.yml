name: Fake TLS Proxy (dd mode)

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Start proxy with fake TLS (dd mode)
        run: |
          # تولید یک secret تصادفی ۳۲ کاراکتری
          SECRET_HEX=$(openssl rand -hex 16)

          # اجرای کانتینر با DOMAIN و SECRET_= این متغیر
          # برای فعال شدن dd حتماً باید SECRET رو پاس بدیم
          docker run -d --name mtproto-proxy \
            -p 443:443 \
            -e DOMAIN=github.com \
            -e SECRET=${SECRET_HEX} \
            telegrammessenger/proxy:latest

          sleep 15

          # IP عمومی
          SERVER_IP=$(curl -s ifconfig.me)

          # لینک نهایی (با پیشوند dd)
          PROXY_LINK="tg://proxy?server=${SERVER_IP}&port=443&secret=dd${SECRET_HEX}"

          echo "========================================="
          echo "Proxy link (paste into Telegram):"
          echo "$PROXY_LINK"
          echo "========================================="

          # زنده نگه‌داشتن تا ۶ ساعت
          sleep 21000
