name: YouTube to Bale Bot (RAR 20MB)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options: [single, playlist, channel, search]
        default: 'playlist'
      url:
        description: 'URL / search query'
        required: true
        type: string
      type:
        description: 'Output type'
        required: true
        type: choice
        options: [video, audio]
        default: 'video'
      quality:
        description: 'Quality'
        required: false
        type: string
        default: '720'
      start:
        description: 'Start number'
        required: false
        type: number
        default: 1
      end:
        description: 'End number (0 = all)'
        required: false
        type: number
        default: 0
      max_videos:
        description: 'Max videos (used if end = 0)'
        required: false
        type: number
        default: 0

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rar unrar python3-pip
          pip3 install -q requests yt-dlp

      - name: Prepare URL
        id: prep
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URL="${{ github.event.inputs.url }}"
          if [ "$MODE" = "channel" ] && [[ "$URL" != http* ]]; then
            if [[ "$URL" == @* ]]; then
              URL="https://www.youtube.com/$URL"
            else
              URL="https://www.youtube.com/@$URL"
            fi
          fi
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "MODE=$MODE" >> $GITHUB_OUTPUT

      - name: Download and RAR
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, re, subprocess, hashlib
          from pathlib import Path
          from datetime import datetime

          MODE = os.environ['MODE']
          URL = os.environ['URL']
          TYPE = os.environ['TYPE']
          QUALITY = os.environ.get('QUALITY', '720')
          START = int(os.environ.get('START', '1'))
          END = int(os.environ.get('END', '0'))
          MAX = int(os.environ.get('MAX', '0'))

          def safe_filename(title, maxlen=60):
              s = re.sub(r'[\\/*?:"<>|]', '', title)
              s = s.strip().replace(' ', '_')
              s = re.sub(r'_+', '_', s)[:maxlen]
              if not s:
                  s = hashlib.md5(title.encode()).hexdigest()[:16]
              return s

          def collect_videos(playlist_url, limit):
              cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if limit and limit > 0:
                  cmd += ['--playlist-end', str(limit)]
              cmd.append(playlist_url)
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
              videos = []
              for line in result.stdout.strip().split('\n'):
                  try:
                      d = json.loads(line)
                      vid = d.get('id')
                      if not vid: continue
                      title = d.get('title', 'Untitled')
                      videos.append({'id': vid, 'title': title, 'url': f'https://youtube.com/watch?v={vid}'})
                  except:
                      continue
              return videos

          def download_video(video_url, filename, output_dir):
              ext = 'mp3' if TYPE == 'audio' else 'mp4'
              payload = {
                  'url': video_url,
                  'os': 'linux',
                  'output': {
                      'type': 'audio' if TYPE == 'audio' else 'video',
                      'format': ext
                  }
              }
              if TYPE == 'audio':
                  payload['audio'] = {'bitrate': f'{QUALITY}k'}
              else:
                  payload['output']['quality'] = f'{QUALITY}p'

              filepath = output_dir / filename
              API = 'https://hub.ytconvert.org/api/download'
              headers = {'User-Agent': 'Mozilla/5.0', 'Content-Type': 'application/json'}
              for attempt in range(3):
                  try:
                      resp = requests.post(API, json=payload, headers=headers, timeout=15)
                      if resp.status_code != 200: continue
                      data = resp.json()
                      status_url = data.get('statusUrl')
                      if not status_url: continue
                      for _ in range(90):
                          time.sleep(2)
                          sresp = requests.get(status_url, headers=headers, timeout=10)
                          if sresp.status_code != 200: break
                          sdata = sresp.json()
                          if sdata.get('status') == 'completed':
                              dl_url = sdata.get('downloadUrl')
                              if dl_url:
                                  with requests.get(dl_url, stream=True, timeout=600) as r:
                                      r.raise_for_status()
                                      with open(filepath, 'wb') as f:
                                          for chunk in r.iter_content(8192):
                                              f.write(chunk)
                                  return filepath
                          elif sdata.get('status') in ('failed', 'error'): break
                  except: time.sleep(2)
              return None

          import requests, json

          print(f'Mode: {MODE}')
          print(f'URL: {URL}')

          if MODE not in ('playlist', 'channel'):
              print('Currently only playlist/channel mode supported for Bale upload.')
              sys.exit(1)

          limit = 0
          if END > 0: limit = END
          elif MAX > 0: limit = MAX

          videos = collect_videos(URL, limit)
          if not videos:
              print('No videos found.')
              sys.exit(1)

          if START > 1:
              videos = videos[START-1:]
          if END > 0:
              videos = videos[:END - START + 1]
          elif MAX > 0:
              videos = videos[:MAX]

          if not videos:
              print('No videos in range.')
              sys.exit(1)

          output_dir = Path('downloads')
          output_dir.mkdir(exist_ok=True)

          txt_lines = []
          downloaded_files = []

          for idx, v in enumerate(videos, start=START):
              print(f'[{idx}/{START+len(videos)-1}] {v["title"]}')
              ext = 'mp3' if TYPE == 'audio' else 'mp4'
              safe_title = safe_filename(v['title'])
              filename = f"E{idx} - {safe_title}.{ext}"
              filepath = download_video(v['url'], filename, output_dir)
              if filepath:
                  downloaded_files.append(filepath)
                  txt_lines.append(f'{v["title"]}\nE{idx} = {v["url"]}')
                  print(f'  Downloaded: {filepath.name}')
              else:
                  txt_lines.append(f'{v["title"]}\nE{idx} = FAILED')
                  print('  Failed.')
              time.sleep(1)

          txt_path = output_dir / 'list.txt'
          txt_path.write_text('\n'.join(txt_lines), encoding='utf-8')

          if not downloaded_files:
              print('Nothing downloaded.')
              sys.exit(1)

          archive_name = output_dir / 'playlist_archive.rar'
          rar_cmd = ['rar', 'a', '-v20m', '-ep1', str(archive_name)] + [str(f) for f in downloaded_files]
          subprocess.run(rar_cmd, check=True)

          for f in downloaded_files:
              f.unlink(missing_ok=True)

          print(f'Archive parts created in {output_dir}')
          PYEOF

      - name: Send RAR files to Bale bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import requests, os, glob, sys

          BOT_TOKEN = os.environ['BALE_BOT_TOKEN']
          CHAT_ID = os.environ['BALE_CHAT_ID']
          BASE_URL = f'https://tapi.bale.ai/bot{BOT_TOKEN}'

          def send_document(filepath):
              with open(filepath, 'rb') as f:
                  response = requests.post(
                      f'{BASE_URL}/sendDocument',
                      data={'chat_id': CHAT_ID},
                      files={'document': f}
                  )
                  return response

          # Send list.txt first
          list_file = 'downloads/list.txt'
          if os.path.exists(list_file):
              print(f'Sending {list_file}...')
              resp = send_document(list_file)
              if resp.ok:
                  print('  list.txt sent.')
              else:
                  print(f'  Failed: {resp.text}')

          # Send RAR parts
          files = sorted(glob.glob('downloads/*.rar'))
          if not files:
              print('No RAR files found.')
              sys.exit(0)

          for filepath in files:
              filesize = os.path.getsize(filepath) / (1024*1024)
              print(f'Sending {filepath} ({filesize:.1f} MB)...')
              resp = send_document(filepath)
              if resp.ok:
                  print('  OK')
              else:
                  print(f'  Failed: {resp.text}')
          PYEOF
