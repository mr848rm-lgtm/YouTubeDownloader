name: My Telegram Proxy (Docker)

on:
  workflow_dispatch:   # اجرا با دکمه دستی

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Start proxy and keep alive
        run: |
          # کانتینر رسمی پروکسی تلگرام رو روی پورت 443 اجرا کن
          docker run -d --name mtproto-proxy -p 443:443 telegrammessenger/proxy:latest

          # صبر کن کانتینر بالا بیاد و secret رو بسازه (حدود ۱۰ ثانیه کافیه)
          sleep 15

          # secret رو از لاگ کانتینر استخراج کن
          SECRET=$(docker logs mtproto-proxy 2>&1 | grep -oP 'secret=\K[0-9a-f]{32}')
          if [ -z "$SECRET" ]; then
            echo "Secret not found in logs, retrying..."
            sleep 10
            SECRET=$(docker logs mtproto-proxy 2>&1 | grep -oP 'secret=\K[0-9a-f]{32}')
          fi

          # IP عمومی سرور گیت‌هاب رو بگیر
          SERVER_IP=$(curl -s ifconfig.me)

          # چاپ لینک نهایی
          echo "========================================="
          echo "Proxy link (copy this and put in Telegram):"
          echo "tg://proxy?server=${SERVER_IP}&port=443&secret=${SECRET}"
          echo "========================================="

          # زنده نگه داشتن workflow (تا ۵ ساعت و ۵۰ دقیقه)
          sleep 21000
