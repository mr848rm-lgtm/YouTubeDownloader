name: Playlist to Text

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Playlist URL'
        required: true
        type: string
      filename:
        description: 'Output file name (without .txt)'
        required: false
        type: string
        default: 'playlist'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install -q yt-dlp

      - name: Extract playlist
        env:
          URL: ${{ github.event.inputs.url }}
          NAME: ${{ github.event.inputs.filename }}
        run: |
          python3 << 'PYEOF'
          import subprocess, sys, json, os

          url = os.environ['URL']
          name = os.environ.get('NAME', 'playlist')

          cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate', url]
          result = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
          if result.returncode != 0:
              print('yt-dlp failed')
              sys.exit(1)

          lines = []
          for i, line in enumerate(result.stdout.strip().split('\n'), start=1):
              try:
                  data = json.loads(line)
                  title = data.get('title', 'Untitled')
                  vid = data.get('id', '')
                  if not vid:
                      continue
                  watch_url = f'https://youtube.com/watch?v={vid}'
                  lines.append(f'{title}\nE{i} = {watch_url}')
              except:
                  continue

          out = f'{name}.txt'
          with open(out, 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))
          print(f'Saved {len(lines)} entries to {out}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add *.txt
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Add playlist ${{ github.event.inputs.filename }}.txt"
          git push
