name: My MTProto Proxy (on/off)

on:
  workflow_dispatch:   # فقط با دست اجرا بشه

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup and Run MTProto Proxy
        run: |
          # 1. ابزار لازم رو نصب کن
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl

          # 2. دانلود پروژه سریع mtg (پروکسی تلگرام)
          wget -q https://github.com/9seconds/mtg/releases/download/v2.1.0/mtg-linux-amd64.tar.gz
          tar xzf mtg-linux-amd64.tar.gz

          # 3. یه کلید رمز تصادفی 32 کاراکتری بساز (secret)
          SECRET=$(openssl rand -hex 16)
          echo "Your secret: $SECRET"

          # 4. اجرای پروکسی روی پورت 443
          #    با IP پیش‌فرض 0.0.0.0 (یعنی همه اینترفیس‌ها)
          ./mtg run -b 0.0.0.0:443 --stats-bind 127.0.0.1:3128 ${SECRET} &
          sleep 3

          # 5. IP عمومی ماشین رو بگیر
          SERVER_IP=$(curl -s ifconfig.me)

          # 6. چاپ لینک پروکسی
          echo "========================================="
          echo "Proxy link (copy this):"
          echo "tg://proxy?server=${SERVER_IP}&port=443&secret=${SECRET}"
          echo "========================================="
          echo "Now proxy is running. Keep this workflow alive."

          # 7. زنده نگه داشتن workflow تا 5 ساعت و 50 دقیقه
          #    (حداکثر 6 ساعت، یه کم کمتر می‌ذاریم که وقت اضافه نمونه)
          sleep 21000   # 21000 ثانیه ≈ 5 ساعت و 50 دقیقه
