name: YouTube to Rubika via RAR

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options: [single, playlist, channel, search]
        default: 'playlist'
      url:
        description: 'URL / search query'
        required: true
        type: string
      type:
        description: 'Output type'
        required: true
        type: choice
        options: [video, audio]
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080, audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      start:
        description: 'Start number'
        required: false
        type: number
        default: 1
      end:
        description: 'End number (0 = all)'
        required: false
        type: number
        default: 0
      max_videos:
        description: 'Max videos (used only if end = 0)'
        required: false
        type: number
        default: 0
      rar_size_gb:
        description: 'Size of each RAR part in GB'
        required: false
        type: number
        default: 1

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'
  BOT_TOKEN: 'BEEDBG0SFLGLEXJMYTAUNNXOAKCEESCWMSKAMVZZEFHBAVSYZCTUKXJYDYHBVHPB'
  API_BASE_URL: 'https://botapi.rubika.ir/v3'

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: Install tools
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq rar wget

      - name: Prepare and get Chat ID
        id: prep
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URL="${{ github.event.inputs.url }}"
          if [ "$MODE" = "channel" ] && [[ "$URL" != http* ]]; then
            if [[ "$URL" == @* ]]; then
              URL="https://www.youtube.com/$URL"
            else
              URL="https://www.youtube.com/@$URL"
            fi
          fi
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "MODE=$MODE" >> $GITHUB_OUTPUT

          echo "Getting Chat ID from Rubika..."
          RESPONSE=$(curl -s -X POST "${{ env.API_BASE_URL }}/${{ env.BOT_TOKEN }}/getUpdates" \
            -H "Content-Type: application/json" \
            -d '{"limit": 1}')
          
          echo "Raw API response:"
          echo "$RESPONSE"
          
          CHAT_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if 'data' in data and 'updates' in data['data'] and len(data['data']['updates']) > 0:
                  print(data['data']['updates'][0]['chat_id'])
              elif 'updates' in data and len(data['updates']) > 0:
                  print(data['updates'][0]['chat_id'])
              elif 'result' in data and len(data['result']) > 0:
                  print(data['result'][0]['chat_id'])
          except:
              pass
          ")
          
          if [ -z "$CHAT_ID" ]; then
            echo "Could not get Chat ID automatically. Please send a message to your bot first."
            exit 1
          fi
          
          echo "CHAT_ID=$CHAT_ID" >> $GITHUB_OUTPUT
          echo "Chat ID found: $CHAT_ID"

      - name: Download and create RAR files
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
          MAX: ${{ github.event.inputs.max_videos }}
          RAR_GB: ${{ github.event.inputs.rar_size_gb }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          from pathlib import Path

          MODE = os.environ['MODE']
          URL = os.environ['URL']
          TYPE = os.environ['TYPE']
          QUALITY = os.environ.get('QUALITY', '720')
          START = int(os.environ.get('START', '1'))
          END = int(os.environ.get('END', '0'))
          MAX = int(os.environ.get('MAX', '0'))
          RAR_GB = float(os.environ.get('RAR_GB', '1'))

          API = 'https://hub.ytconvert.org/api/download'
          HEADERS = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Content-Type': 'application/json',
          }

          def safe_name(text, maxlen=50):
              s = re.sub(r'[^\w]', '_', str(text))[:maxlen]
              s = re.sub(r'_+', '_', s).strip('_')
              if not s:
                  s = hashlib.md5(str(text).encode()).hexdigest()[:8]
              return s

          def safe_filename(title, maxlen=80):
              s = re.sub(r'[\\/*?:"<>|]', '', title)
              s = s.strip().replace(' ', '_')
              s = re.sub(r'_+', '_', s)
              s = s[:maxlen]
              if not s:
                  s = hashlib.md5(title.encode()).hexdigest()[:16]
              return s

          def get_channel_from_url(url):
              m = re.search(r'@([\w.-]+)', url)
              if m: return m.group(1)
              return None

          def collect_videos(playlist_url, limit):
              cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if limit and limit > 0:
                  cmd += ['--playlist-end', str(limit)]
              cmd.append(playlist_url)
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
              videos = []
              for line in result.stdout.strip().split('\n'):
                  try:
                      d = json.loads(line)
                      vid = d.get('id')
                      if not vid: continue
                      title = d.get('title', 'Untitled')
                      videos.append({'id': vid, 'title': title, 'url': f'https://youtube.com/watch?v={vid}'})
                  except:
                      continue
              return videos

          def download_video(video_url, filename, output_dir):
              ext = 'mp3' if TYPE == 'audio' else 'mp4'
              payload = {
                  'url': video_url,
                  'os': 'linux',
                  'output': {
                      'type': 'audio' if TYPE == 'audio' else 'video',
                      'format': ext
                  }
              }
              if TYPE == 'audio':
                  payload['audio'] = {'bitrate': f'{QUALITY}k'}
              else:
                  payload['output']['quality'] = f'{QUALITY}p'

              filepath = output_dir / filename
              for attempt in range(3):
                  try:
                      resp = requests.post(API, json=payload, headers=HEADERS, timeout=15)
                      if resp.status_code != 200:
                          time.sleep(3)
                          continue
                      data = resp.json()
                      status_url = data.get('statusUrl')
                      if not status_url:
                          continue
                      for _ in range(90):
                          time.sleep(2)
                          try:
                              sresp = requests.get(status_url, headers=HEADERS, timeout=10)
                              if sresp.status_code != 200:
                                  break
                              sdata = sresp.json()
                              if sdata.get('status') == 'completed':
                                  dl_url = sdata.get('downloadUrl')
                                  if dl_url:
                                      with requests.get(dl_url, stream=True, timeout=600) as r:
                                          r.raise_for_status()
                                          with open(filepath, 'wb') as f:
                                              for chunk in r.iter_content(8192):
                                                  f.write(chunk)
                                      return filepath
                              elif sdata.get('status') in ('failed', 'error'):
                                  break
                          except:
                              continue
                  except:
                      time.sleep(2)
              return None

          import requests

          print(f'Mode: {MODE}')
          print(f'URL: {URL}')

          if MODE in ('playlist', 'channel'):
              limit = 0
              if END > 0:
                  limit = END
              elif MAX > 0:
                  limit = MAX

              videos = collect_videos(URL, limit)
              if not videos:
                  print('No videos found.')
                  sys.exit(1)

              if START > 1:
                  videos = videos[START-1:]
              if END > 0:
                  videos = videos[:END - START + 1]
              elif MAX > 0:
                  videos = videos[:MAX]

              if not videos:
                  print('No videos in range.')
                  sys.exit(1)

              channel_handle = get_channel_from_url(URL) or 'playlist'
              folder_name = safe_name(channel_handle, 40)
              output_dir = Path(f'downloads/{folder_name}')
              output_dir.mkdir(parents=True, exist_ok=True)

              downloaded_files = []

              for idx, v in enumerate(videos, start=START):
                  print(f'[{idx}/{START+len(videos)-1}] {v["title"]}')
                  ext = 'mp3' if TYPE == 'audio' else 'mp4'
                  safe_title = safe_filename(v['title'])
                  filename = f"E{idx} - {safe_title}.{ext}"
                  filepath = download_video(v['url'], filename, output_dir)
                  if filepath:
                      downloaded_files.append(filepath)
                      print(f'  Downloaded: {filepath.name}')
                  else:
                      print('  Failed.')
                  time.sleep(1)

              max_bytes = int(RAR_GB * 1024 * 1024 * 1024)
              current_size = 0
              part_num = 1
              current_batch = []
              all_rar_files = []

              for f in sorted(downloaded_files, key=lambda x: x.stat().st_size):
                  fsize = f.stat().st_size
                  if current_size + fsize > max_bytes and current_batch:
                      rar_name = f'S{part_num}.rar'
                      rar_path = output_dir / rar_name
                      file_list = [str(p.resolve()) for p in current_batch]
                      subprocess.run(['rar', 'a', '-m0', '-v1g', str(rar_path)] + file_list, check=True)
                      all_rar_files.extend(sorted(output_dir.glob(f'S{part_num}*')))
                      current_batch = []
                      current_size = 0
                      part_num += 1
                  current_batch.append(f)
                  current_size += fsize

              if current_batch:
                  rar_name = f'S{part_num}.rar'
                  rar_path = output_dir / rar_name
                  file_list = [str(p.resolve()) for p in current_batch]
                  subprocess.run(['rar', 'a', '-m0', '-v1g', str(rar_path)] + file_list, check=True)
                  all_rar_files.extend(sorted(output_dir.glob(f'S{part_num}*')))

              for f in downloaded_files:
                  f.unlink(missing_ok=True)

              with open(output_dir / 'rar_list.txt', 'w') as f:
                  for rar_file in all_rar_files:
                      f.write(f"{rar_file}\n")

              print(f'Done. RAR files created in {output_dir}')

          elif MODE == 'single':
              vid_match = re.search(r'(?:v=|/)([\w-]{11})', URL)
              if not vid_match:
                  print('Invalid URL'); sys.exit(1)
              vid = vid_match.group(1)
              channel = get_channel_from_url(URL) or 'video'
              out = Path(f'downloads/{safe_name(channel)}')
              out.mkdir(parents=True, exist_ok=True)
              ext = 'mp3' if TYPE == 'audio' else 'mp4'
              filename = f"E1 - {safe_filename(vid)}.{ext}"
              filepath = download_video(URL, filename, out)
              if filepath:
                  rar_path = out / 'S1.rar'
                  subprocess.run(['rar', 'a', '-m0', '-v1g', str(rar_path), str(filepath.resolve())], check=True)
                  filepath.unlink()
                  print('Done.')

          elif MODE == 'search':
              query = URL
              limit = MAX if MAX > 0 else 10
              videos = collect_videos(f'ytsearch{limit}:{query}', limit)
              if not videos:
                  print('No results.'); sys.exit(1)
              out = Path(f'downloads/search_{safe_name(query)}')
              out.mkdir(parents=True, exist_ok=True)
              lines = []
              for i, v in enumerate(videos, 1):
                  lines.append(f'{v["title"]}\nE{i} = {v["url"]}')
              (out / f'search_{safe_name(query)}.txt').write_text('\n'.join(lines), encoding='utf-8')
          PYEOF

      - name: Send RAR files to Rubika
        env:
          CHAT_ID: ${{ steps.prep.outputs.CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, requests, time, glob

          TOKEN = os.environ['BOT_TOKEN']
          BASE_URL = os.environ['API_BASE_URL']
          CHAT_ID = os.environ['CHAT_ID']

          if not CHAT_ID:
              print("Error: Chat ID not found.")
              exit(1)

          download_dirs = glob.glob('downloads/*')
          if not download_dirs:
              print("No download directory found.")
              exit(1)
          
          rar_files = []
          for d in download_dirs:
              rar_files.extend(glob.glob(f'{d}/S*.rar'))

          if not rar_files:
              print("No RAR files to send.")
              exit(0)
          
          print(f"Found {len(rar_files)} RAR files to send.")

          def send_file_to_rubika(file_path, chat_id):
              file_name = os.path.basename(file_path)
              file_size = os.path.getsize(file_path)
              print(f"Uploading {file_name} ({file_size} bytes)...")

              with open(file_path, 'rb') as f:
                  response = requests.post(
                      f"{BASE_URL}/{TOKEN}/sendFile",
                      files={'file': (file_name, f, 'application/x-rar-compressed')},
                      data={'chat_id': chat_id, 'type': 'document'}
                  )
              
              if response.status_code == 200:
                  print(f"  File {file_name} sent successfully.")
              else:
                  print(f"  Failed to send {file_name}. Status: {response.status_code}, Response: {response.text}")

          for rar_file in sorted(rar_files):
              send_file_to_rubika(rar_file, CHAT_ID)
              time.sleep(2)

          print("All files processed.")
          PYEOF
