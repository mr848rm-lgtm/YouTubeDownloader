name: Telegram Proxy (disguised as GitHub)

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Start proxy with fake TLS (disguise as github.com)
        run: |
          # اجرای پروکسی با DOMAIN=github.com تا ترافیک مثل HTTPS گیت‌هاب بشه
          # خود کانتینر یک secret تصادفی تولید می‌کنه
          docker run -d --name mtproto-proxy \
            -p 443:443 \
            -e DOMAIN=github.com \
            telegrammessenger/proxy:latest

          # صبر کن بالا بیاد
          sleep 15

          # لینک کامل پروکسی (با پیشوند dd) از لاگ استخراج کن
          PROXY_LINK=$(docker logs mtproto-proxy 2>&1 | grep -oP 'tg://proxy\?[^ ]*')
          if [ -z "$PROXY_LINK" ]; then
            echo "Retrying..."
            sleep 10
            PROXY_LINK=$(docker logs mtproto-proxy 2>&1 | grep -oP 'tg://proxy\?[^ ]*')
          fi

          echo "========================================="
          echo "Your disguised proxy link:"
          echo "$PROXY_LINK"
          echo "========================================="

          # زنده نگه داشتن ۶ ساعت
          sleep 21000
