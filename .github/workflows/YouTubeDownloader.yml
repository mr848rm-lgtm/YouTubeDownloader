name: 🎯 YouTube to Bale

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
        default: 'playlist'
      url:
        description: '🎬 URL or Search Query or channel name'
        required: true
        type: string
      type:
        description: '📦 Output Type (video/audio)'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (e.g., 720)'
        required: false
        type: string
        default: '720'
      max_videos:
        description: '🔢 Max results (0 = all)'
        required: false
        type: number
        default: 0
      bale_max_video_mb:
        description: '📏 Max size per chunk (MB) for Bale (0 = no split)'
        required: false
        type: number
        default: 49

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'
  BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
  BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}

jobs:
  download-and-upload:
    name: 🚀 Download & Upload to Bale
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)
          command -v ffmpeg &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          [[ "$M" == "channel" && "$U" != http* ]] && U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT

      - name: 🎯 Download & Upload to Bale
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          MAX: ${{ github.event.inputs.max_videos }}
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
          BALE_MAX_VIDEO_MB: ${{ github.event.inputs.bale_max_video_mb }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          import requests as rq
          from pathlib import Path
          from datetime import datetime

          M = os.environ['MODE']
          U = os.environ['URL']
          T = os.environ['TYPE']
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '0'))
          BALE_TOKEN = os.environ['BALE_TOKEN']
          BALE_CHAT_ID = os.environ['BALE_CHAT_ID']
          SPLIT_MB = int(os.environ.get('BALE_MAX_VIDEO_MB', '49')) or 0
          BALE_API = f'https://tapi.bale.ai/bot{BALE_TOKEN}'

          API = 'https://hub.ytconvert.org/api/download'
          H = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Referer': 'https://media.ytmp3.gg/',
              'Content-Type': 'application/json',
              'Origin': 'https://media.ytmp3.gg'
          }

          # ---------- Helper Functions (unchanged) ----------
          def safe_name(text, maxlen=40):
              safe = re.sub(r'[^\w]', '_', text)[:maxlen]
              safe = re.sub(r'_+', '_', safe).strip('_')
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def fm(n):
              if not n: return 'N/A'
              try:
                  n = int(n)
                  return f'{n/1e6:.1f}M' if n >= 1e6 else f'{n/1e3:.1f}K' if n >= 1e3 else str(n)
              except: return str(n)

          def gv(vid):
              try:
                  r = subprocess.run(
                      ['yt-dlp', '--dump-json', '--no-warnings', '--no-check-certificate',
                       f'https://youtube.com/watch?v={vid}'],
                      capture_output=True, text=True, timeout=15
                  )
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout)
                      channel = (d.get('channel') or d.get('uploader') or 
                                d.get('uploader_id') or d.get('creator') or 'Unknown')
                      views = d.get('view_count')
                      duration = d.get('duration', 0)
                      channel_url = d.get('channel_url', '') or d.get('uploader_url', '')
                      handle = None
                      if channel_url:
                          m = re.search(r'@([\w-]+)', channel_url)
                          if m: handle = m.group(1)
                      if not handle:
                          handle = safe_name(channel, 30) if channel and channel != 'Unknown' else None
                      return (channel.strip() if channel else 'Unknown', views, int(duration) if duration else 0, handle)
              except: pass
              return ('Unknown', None, 0, None)

          def get_channel_from_url(url):
              for pat in [r'@([\w-]+)', r'channel/([\w-]+)', r'c/([\w-]+)', r'user/([\w-]+)']:
                  m = re.search(pat, url)
                  if m: return m.group(1)
              return None

          def get_channel_from_playlist(playlist_url):
              try:
                  cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--playlist-end', '1',
                         '--no-warnings', '--no-check-certificate', playlist_url]
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout.strip().split('\n')[0])
                      vid = d.get('id', '')
                      if vid:
                          _, _, _, handle = gv(vid)
                          if handle: return handle
                      ch = d.get('channel') or d.get('uploader') or d.get('uploader_id')
                      if ch: return safe_name(ch, 30)
              except: pass
              return None

          def gvl(u, n):
              channel_folder = get_channel_from_url(u)
              if not channel_folder and 'playlist' in u:
                  print('   🔍 Detecting channel from playlist...')
                  channel_folder = get_channel_from_playlist(u)
              if not channel_folder:
                  channel_folder = 'playlist_videos'
              print(f'   📁 Folder: {channel_folder}_videos')
              c = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if n > 0: c.extend(['--playlist-end', str(n)])
              c.append(u)
              r = subprocess.run(c, capture_output=True, text=True, timeout=30)
              v = []
              for line in r.stdout.strip().split('\n'):
                  if line and (n == 0 or len(v) < n):
                      try:
                          d = json.loads(line)
                          vid = d.get('id', '')
                          if not vid: continue
                          title = d.get('title', 'Untitled')[:60]
                          print(f'   📊 [{len(v)+1}/{n if n>0 else "?"}] {title}...')
                          ch, vw, dr, _ = gv(vid)
                          if not ch or ch == 'Unknown':
                              ch = (d.get('channel') or d.get('uploader') or 
                                    d.get('uploader_id') or d.get('creator') or 'Unknown')
                          if not vw: vw = d.get('view_count')
                          if not dr: dr = d.get('duration', 0)
                          v.append({
                              'id': vid, 't': title,
                              'u': f'https://youtube.com/watch?v={vid}',
                              'dr': int(dr) if dr else 0,
                              'th': f'https://i.ytimg.com/vi/{vid}/maxresdefault.jpg',
                              'c': str(ch).strip() if ch else 'Unknown',
                              'v': fm(vw)
                          })
                      except Exception as e:
                          print(f'      ⚠️ Skip: {str(e)[:40]}')
                          continue
              return v, channel_folder

          def dl_video(u):
              e = 'mp3' if T == 'audio' else 'mp4'
              p = {'url': u, 'os': 'linux', 'output': {'type': 'audio' if T == 'audio' else 'video', 'format': e}}
              if T == 'audio': p['audio'] = {'bitrate': f'{Q}k'}
              else: p['output']['quality'] = f'{Q}p'
              for retry in range(3):
                  if retry > 0:
                      print(f'   🔄 Retry {retry}/3...')
                      time.sleep(5)
                  try:
                      rr = rq.post(API, json=p, headers=H, timeout=15)
                      if rr.status_code != 200: continue
                      d = rr.json()
                      su = d.get('statusUrl')
                      if not su: continue
                      print('   ⏳ Converting...')
                      for _ in range(60):
                          time.sleep(2)
                          try:
                              sr = rq.get(su, headers=H, timeout=10)
                              if sr.status_code == 200:
                                  sd = sr.json()
                                  st = sd.get('status', '')
                                  if st == 'completed':
                                      du = sd.get('downloadUrl')
                                      if du: return {'u': du, 'e': e}
                                  elif st in ('failed', 'error'): break
                          except: continue
                  except: time.sleep(2)
              return None

          def download_file(url, filepath):
              try:
                  dr = rq.get(url, headers=H, stream=True, timeout=600)
                  if dr.status_code == 200:
                      total = int(dr.headers.get('content-length', 0))
                      done = 0
                      with open(filepath, 'wb') as f:
                          for chunk in dr.iter_content(65536):
                              f.write(chunk)
                              done += len(chunk)
                              if total > 0 and done % (10*65536) == 0:
                                  print(f'\r   ⬇️ {done*100/total:.1f}%', end='')
                      print('\r   ⬇️ 100.0%')
                      return filepath.stat().st_size
              except Exception as e:
                  print(f'   ❌ Download error: {e}')
              return 0

          # ---------- Video Splitting (optional) ----------
          def get_video_duration(filepath):
              try:
                  result = subprocess.run(
                      ['ffprobe', '-v', 'error', '-show_entries', 'format=duration',
                       '-of', 'default=noprint_wrappers=1:nokey=1', str(filepath)],
                      capture_output=True, text=True, timeout=15
                  )
                  return float(result.stdout.strip())
              except: return None

          def split_video(video_path, max_size_mb):
              if max_size_mb <= 0:
                  return [video_path]
              size_mb = video_path.stat().st_size / 1e6
              if size_mb <= max_size_mb:
                  return [video_path]
              duration = get_video_duration(video_path)
              if not duration or duration <= 0:
                  print("   ⚠️ Could not determine video duration, cannot split.")
                  return []
              n_chunks = int(size_mb / max_size_mb) + 1
              chunk_duration = duration / n_chunks
              print(f'   ✂️ Splitting {size_mb:.1f}MB video into {n_chunks} parts...')
              parent = video_path.parent
              stem = video_path.stem
              ext = video_path.suffix
              chunks = []
              for i in range(n_chunks):
                  start = i * chunk_duration
                  end = (i + 1) * chunk_duration if i < n_chunks - 1 else duration
                  chunk_path = parent / f'{stem}_part{i+1:02d}{ext}'
                  subprocess.run([
                      'ffmpeg', '-y', '-i', str(video_path),
                      '-ss', str(start), '-to', str(end),
                      '-c', 'copy', '-avoid_negative_ts', 'make_zero',
                      str(chunk_path)
                  ], capture_output=True, check=True)
                  chunks.append(chunk_path)
                  print(f'      Chunk {i+1}/{n_chunks}: {chunk_path.stat().st_size/1e6:.1f}MB')
              video_path.unlink()
              return chunks

          # ---------- Bale Upload Functions ----------
          def bale_send_video(chat_id, video_path, caption=''):
              url = f'{BALE_API}/sendVideo'
              with open(video_path, 'rb') as vid:
                  resp = rq.post(url,
                                 data={'chat_id': chat_id, 'caption': caption},
                                 files={'video': vid})
              try:
                  body = resp.json()
                  print(f'      📬 Bale response: {json.dumps(body, indent=2)[:200]}')
                  return body
              except:
                  print(f'      ❌ Bale raw response: {resp.text[:200]}')
                  return {}

          def bale_send_document(chat_id, file_path, caption=''):
              url = f'{BALE_API}/sendDocument'
              with open(file_path, 'rb') as f:
                  resp = rq.post(url,
                                 data={'chat_id': chat_id, 'caption': caption},
                                 files={'document': f})
              try:
                  return resp.json()
              except:
                  return {}

          # ---------- Main Logic ----------
          print(f'{"="*50}')
          print(f'🎬 {M.upper()} MODE')
          print(f'{"="*50}')

          if M in ('playlist', 'channel'):
              print('\n📋 Extracting videos...')
              v, cn = gvl(U, MX)
              if not v: print('❌ No videos found'); sys.exit(1)

              tmpdir = Path('./upload_temp')
              tmpdir.mkdir(exist_ok=True)

              for i, x in enumerate(v, 1):
                  print(f'\n📥 [{i}/{len(v)}] {x["t"]}')
                  print(f'   Channel: {x["c"]} | Duration: {x["dr"]//60}m | Views: {x["v"]}')

                  result = dl_video(x['u'])
                  if not result:
                      print('   ❌ Conversion failed, skipping...')
                      continue

                  video_path = tmpdir / f'v_{x["id"]}.{result["e"]}'
                  size = download_file(result['u'], video_path)
                  if not size:
                      print('   ❌ Download failed, skipping...')
                      continue
                  print(f'   ✅ Downloaded ({size/1e6:.1f}MB)')

                  # Split if requested
                  if SPLIT_MB > 0:
                      chunks = split_video(video_path, SPLIT_MB)
                  else:
                      chunks = [video_path]

                  # Prepare info file
                  dur_str = f'{x["dr"]//60} minutes' if x['dr'] else 'Unknown'
                  info_text = (
                      f'🎬 {x["t"]}\n'
                      f'👤 {x["c"]}\n'
                      f'⏱ {dur_str}\n'
                      f'👁 {x["v"]} views\n'
                      f'🔗 {x["u"]}\n\n'
                      f'📅 Downloaded: {datetime.now():%Y-%m-%d %H:%M}'
                  )
                  info_path = tmpdir / f'info_{x["id"]}.md'
                  info_path.write_text(info_text)

                  label = f'E{i}'

                  for idx, chunk_path in enumerate(chunks, 1):
                      part_label = f'{label} (part {idx}/{len(chunks)})' if len(chunks) > 1 else label
                      caption = f'{part_label} - {x["t"]}'
                      print(f'   📤 Uploading {part_label} ({chunk_path.stat().st_size/1e6:.1f}MB)...')
                      resp = bale_send_video(BALE_CHAT_ID, str(chunk_path), caption=caption)
                      if resp.get('ok'):
                          print(f'   ✅ Uploaded {part_label}')
                      else:
                          print(f'   ❌ Upload failed for {part_label}: {resp}')
                      chunk_path.unlink()

                  print(f'   📄 Uploading info for {label}...')
                  info_caption = f'📝 اطلاعات ویدیوی بالا ({label})'
                  bale_send_document(BALE_CHAT_ID, str(info_path), caption=info_caption)
                  info_path.unlink()

                  print(f'   ✅ Done with {label}')
                  if i < len(v): time.sleep(2)

              print(f'\n{"="*50}')
              print('🎉 All items processed and uploaded to Bale!')
          else:
              print('Single/search mode not yet implemented for Bale. Use playlist.')
          PYEOF
