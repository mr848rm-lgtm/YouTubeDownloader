name: Invisible Tunnel (Reality via Bore)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    env:
      UUID: "12345678-1234-1234-1234-123456789abc"
      REALITY_TARGET: "www.apple.com"   # اگر apple.com برات باز نیست بذار www.cloudflare.com
      BORE_PORT: 25565   # پورت دلخواه برای تونل
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl wget unzip

      - name: Download Xray and Bore
        run: |
          # Xray
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v1.8.23/Xray-linux-64.zip" -O xray.zip
          unzip -q xray.zip
          chmod +x xray
          
          # Bore (ابزار تونل معکوس)
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz"
          tar xzf bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Generate Reality Keys
        run: |
          KEYS=$(./xray x25519)
          PRIVATE_KEY=$(echo "$KEYS" | grep "Private key" | awk '{print $3}')
          PUBLIC_KEY=$(echo "$KEYS" | grep "Public key" | awk '{print $3}')
          echo "PRIVATE_KEY=$PRIVATE_KEY" >> $GITHUB_ENV
          echo "PUBLIC_KEY=$PUBLIC_KEY" >> $GITHUB_ENV

      - name: Start Xray and Bore tunnel
        run: |
          # کانفیگ Xray روی پورت ۴۴۳ (داخلی)
          cat > config.json << EOF
          {
            "log": {"loglevel": "warning"},
            "inbounds": [{
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID", "flow": "xtls-rprx-vision"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "show": false,
                  "dest": "$REALITY_TARGET:443",
                  "xver": 0,
                  "serverNames": ["$REALITY_TARGET"],
                  "privateKey": "$PRIVATE_KEY",
                  "shortIds": [""]
                }
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          
          # اجرا با sudo
          sudo ./xray run -config config.json &
          sleep 3
          
          # ایجاد تونل معکوس Bore
          # پورت داخلی ۴۴۳ رو به یک دامنه عمومی نقشه می‌کنه
          ./bore local 443 --to bore.pub --port $BORE_PORT &
          sleep 5
          
          # گرفتن دامنه عمومی از لاگ bore
          BORE_DOMAIN=$(journalctl -u bore 2>/dev/null || ./bore local 443 --to bore.pub 2>&1 & sleep 2 && ps aux | grep bore)
          # روش ساده‌تر: دامنه رو از لاگ stderr خود bore پیدا می‌کنیم
          BORE_DOMAIN=$(./bore local 443 --to bore.pub 2>&1 | grep -oP 'bore\.pub:\K[0-9]+' | head -1)
          if [ -z "$BORE_DOMAIN" ]; then
            # تلاش دوباره
            sleep 5
            BORE_DOMAIN=$(./bore local 443 --to bore.pub 2>&1 | grep -oP 'bore\.pub:\K[0-9]+' | head -1)
          fi
          
          PUBLIC_DOMAIN="bore.pub:${BORE_DOMAIN}"
          
          echo "========================================="
          echo "Tunnel established. Your connection info:"
          echo "Server: $PUBLIC_DOMAIN"
          echo "Port: 443 (implicit via tunnel, use default)"
          echo "UUID: $UUID"
          echo "Flow: xtls-rprx-vision"
          echo "Security: reality"
          echo "SNI: $REALITY_TARGET"
          echo "PublicKey: $PUBLIC_KEY"
          echo "Fingerprint: chrome"
          echo ""
          echo "Link: vless://$UUID@$PUBLIC_DOMAIN?encryption=none&flow=xtls-rprx-vision&security=reality&sni=$REALITY_TARGET&fp=chrome&pbk=$PUBLIC_KEY#GitHub-Bore"
          echo "========================================="
          
          # محدودیت سرعت
          sudo tc qdisc add dev eth0 root handle 1: htb default 30 2>/dev/null || true
          sudo tc class add dev eth0 parent 1: classid 1:1 htb rate 400kbit ceil 400kbit 2>/dev/null || true
          
          sleep 21000
