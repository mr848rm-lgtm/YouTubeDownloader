name: VMess WS (No TLS)

on:
  workflow_dispatch:

jobs:
  vmess:
    runs-on: ubuntu-latest
    env:
      UUID: "12345678-1234-1234-1234-123456789abc"
      PORT: 80
      WSPATH: "/ws"
    steps:
      - name: Install Xray (direct download)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl wget unzip
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v1.8.23/Xray-linux-64.zip" -O xray.zip
          unzip -q xray.zip
          chmod +x xray

      - name: Create config and run
        run: |
          cat > config.json << EOF
          {
            "log": {"loglevel": "warning"},
            "inbounds": [{
              "port": $PORT,
              "protocol": "vmess",
              "settings": {
                "clients": [{"id": "$UUID"}]
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "$WSPATH"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

          sudo ./xray run -config config.json &
          sleep 3

          IP=$(curl -s ifconfig.me)
          echo "========================================="
          echo "VMess WS Config:"
          echo "IP: $IP"
          echo "Port: $PORT"
          echo "UUID: $UUID"
          echo "Path: $WSPATH"
          echo ""
          echo "Link: vmess://$(echo -n '{"v":"2","ps":"GitHubVMess","add":"'$IP'","port":"'$PORT'","id":"'$UUID'","aid":"0","net":"ws","path":"'$WSPATH'","type":"none"}' | base64 -w 0)"
          echo "========================================="
          sleep 21000
